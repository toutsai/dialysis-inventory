<div class="page-container">
  <div class="page-header">
    <div class="header-toolbar">
      <div class="toolbar-left">
        <h1 class="page-title">預約變更(長期變更)</h1>
        <button class="btn btn-primary" (click)="openNewUpdateDialog()" [disabled]="isPageLocked()">
          <i class="fas fa-plus-circle"></i> 新增預約變更
        </button>
      </div>
    </div>
    <p class="page-description">
      針對身分、頻率與長期床位的變動，顯示所有已排程的病人屬性或總表規則變更。變更將在「生效日期」當天凌晨由系統自動執行。
    </p>
  </div>

  <main class="page-main-content">
    <div class="updates-list-container">
      <div class="custom-calendar-header">
        <div class="date-navigator">
          <button (click)="handlePrev()">&lt;</button>
          <span class="calendar-title-text">{{ calendarTitle() }}</span>
          <button (click)="handleNext()">&gt;</button>
        </div>
        <div class="view-actions">
          <button (click)="handleToday()">今天</button>
        </div>
      </div>

      <div *ngIf="isLoading()" class="loading-state">
        <div class="spinner"></div>
        正在載入預約變更資料...
      </div>

      <div *ngIf="!isLoading()" class="calendar-wrapper">
        <full-calendar #fullCalendar [options]="calendarOptions()"></full-calendar>
        <div *ngIf="!isLoading() && scheduledUpdates().length === 0" class="empty-state">
          <i class="fas fa-calendar-check"></i>
          <p>目前沒有任何預約變更記錄。</p>
        </div>
      </div>
    </div>
  </main>

  <app-new-update-type-dialog
    [isVisible]="isNewTypeDialogVisible()"
    [allPatients]="allPatients()"
    (close)="isNewTypeDialogVisible.set(false)"
    (continue)="handleNewTypeSelected($event)"
  ></app-new-update-type-dialog>

  <app-patient-update-scheduler-dialog
    [isVisible]="isSchedulerDialogVisible()"
    [patient]="patientForScheduler()"
    [changeType]="changeTypeForScheduler()"
    [allPatients]="allPatients()"
    [isEditing]="isEditingUpdate()"
    [initialData]="isEditingUpdate() ? currentUpdateForAction() : null"
    (close)="closeSchedulerDialogs()"
    (submit)="handleScheduledUpdate($event)"
  ></app-patient-update-scheduler-dialog>

  <app-confirm-dialog
    [isVisible]="isConfirmDialogVisible()"
    [title]="confirmDialogTitle()"
    [message]="confirmDialogMessage()"
    (cancel)="closeConfirmDialog()"
  >
    <div class="dialog-footer-custom">
      <button class="btn btn-secondary" (click)="closeConfirmDialog()">關閉</button>
      <div>
        <button
          *ngIf="currentUpdateForAction() && currentUpdateForAction().status === 'pending'"
          class="btn btn-primary"
          (click)="handleEdit()"
          [disabled]="isPageLocked()"
        >
          修改
        </button>
        <button
          *ngIf="currentUpdateForAction() && canDeleteUpdate(currentUpdateForAction())"
          class="btn btn-danger"
          (click)="handleDelete()"
          [disabled]="isPageLocked()"
        >
          撤銷此預約
        </button>
      </div>
    </div>
  </app-confirm-dialog>
</div>
