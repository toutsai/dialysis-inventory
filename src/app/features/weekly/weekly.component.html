<div>
  <div class="page-container">
    <header class="page-header">
      <div class="header-toolbar">
        <div class="toolbar-left">
          <h1 class="page-title">週排班表</h1>
          <div class="date-navigator">
            <button (click)="changeWeek(-7)">&lt; 上一週</button>
            <span class="week-display-text">{{ weekDisplay() }}</span>
            <button (click)="changeWeek(7)">下一週 &gt;</button>
          </div>
          <div class="main-actions">
            <button (click)="goToToday()">回到本週</button>
            <button class="btn btn-warning" (click)="runScheduleCheck()">排程檢視</button>
            <button
              class="btn btn-info"
              (click)="openBedAssignmentDialog()"
              [disabled]="isPageLocked()"
            >
              智慧排床
            </button>
            <div class="search-container">
              <input
                type="text"
                [(ngModel)]="searchQueryValue"
                class="patient-search-input"
                placeholder="搜尋病人姓名/病歷號..."
                (focus)="isSearchFocused.set(true)"
                (blur)="handleSearchBlur()"
              />
              @if (searchResults().length > 0 && isSearchFocused()) {
              <ul class="search-results">
                @for (patient of searchResults(); track patient.id) {
                  <li (click)="locatePatientOnGrid(patient.id)">
                    {{ patient.name }} - {{ patient.medicalRecordNumber }}
                  </li>
                }
              </ul>
              }
            </div>
          </div>
        </div>
        <div class="main-actions">
          <span class="status-text">{{ statusText() }}</span>
          <button
            class="btn-save"
            [disabled]="!hasUnsavedChanges() || isPageLocked()"
            (click)="saveChangesToCloud()"
          >
            儲存變更
          </button>
          <button class="btn btn-secondary" (click)="exportWeeklyScheduleToExcel()">
            匯出Excel
          </button>
        </div>
      </div>
    </header>

    <main class="page-main-content">
      <div class="schedule-area">
        <div class="stats-toolbar-wrapper" [style.paddingLeft.px]="leftOffset()">
          <app-stats-toolbar
            [statsData]="statsToolbarData()"
            [weekdays]="statsToolbarWeekdays()"
            [columnWidths]="columnWidths()"
            size="compact"
          ></app-stats-toolbar>
        </div>

        <app-schedule-table
          class="schedule-table-component"
          [layout]="bedLayout"
          [scheduleData]="weekScheduleMap()"
          [patientMap]="patientStore.patientMap()"
          [shifts]="SHIFTS"
          [weekdays]="WEEKDAYS"
          [weekDates]="weekDateStrings()"
          [hepatitisBeds]="hepatitisBeds"
          [getStyleFunc]="getWeeklyCellStyle"
          [isDateInPast]="isDateInPast"
          [typesMap]="typesMapForThisWeek()"
          [isPageLocked]="isPageLocked()"
          (gridClick)="handleGridClick($event)"
          (drop)="onDrop($event.event, $event.slotId)"
          (dragStart)="onDragStart($event.event, $event.slotId)"
          (dragOver)="onDragOver($event)"
          (dragLeave)="onDragLeave($event)"
          (showMemos)="showPatientMemos($event)"
          (columnWidthsChange)="updateColumnWidths($event)"
          (leftOffsetChange)="updateLeftOffset($event)"
        ></app-schedule-table>
      </div>
      <app-inpatient-sidebar
        [patients]="patientStore.allPatients()"
        [scheduledIds]="scheduledPatientIds()"
        (dragStart)="onSidebarDragStart($event.event, $event.patient)"
        [class.sidebar-locked]="isPageLocked()"
      ></app-inpatient-sidebar>
    </main>
  </div>

  <!-- Modals -->
  <app-memo-display-dialog
    [isVisible]="isMemoDialogVisible()"
    [patientId]="patientIdForDialog()"
    [patientName]="patientNameForDialog()"
    (closeEvent)="isMemoDialogVisible.set(false)"
  ></app-memo-display-dialog>
  <app-bed-assignment-dialog
    [isVisible]="isProblemSolverDialogVisible()"
    title="智慧排床助理"
    [allPatients]="patientStore.allPatients()"
    [bedLayout]="bedLayout"
    [scheduleData]="weekScheduleMap()"
    [shifts]="SHIFTS"
    [freqMap]="FREQ_MAP_TO_DAY_INDEX"
    [predefinedPatientGroups]="problemsToSolve()"
    assignmentMode="frequency"
    (close)="isProblemSolverDialogVisible.set(false)"
    (assignBed)="handleAssignBed($event)"
  ></app-bed-assignment-dialog>
  <app-patient-select-dialog
    [isVisible]="isPatientSelectDialogVisible()"
    title="選擇病人排班"
    [patients]="patientStore.allPatients()"
    [showFillOptions]="true"
    (confirm)="handlePatientSelect($event)"
    (cancel)="isPatientSelectDialogVisible.set(false)"
  ></app-patient-select-dialog>
  <app-selection-dialog
    [isVisible]="isClearDialogVisible()"
    title="清除排班選項"
    [options]="CLEAR_OPTIONS"
    (select)="handleClearSelect($event)"
    (cancel)="isClearDialogVisible.set(false)"
  ></app-selection-dialog>
  <app-alert-dialog
    [isVisible]="isAlertDialogVisible()"
    [title]="alertDialogTitle()"
    [message]="alertDialogMessage()"
    (confirm)="isAlertDialogVisible.set(false)"
  ></app-alert-dialog>
  <app-confirm-dialog
    [isVisible]="isConfirmDialogVisible()"
    [title]="confirmDialogTitle()"
    [message]="confirmDialogMessage()"
    (confirm)="handleConfirm()"
    (cancel)="handleCancel()"
  ></app-confirm-dialog>
</div>
