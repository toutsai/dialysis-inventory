<div class="login-container">
  <!-- Background decorative elements -->
  <div class="bg-decoration">
    <svg class="bg-icon bg-icon-1" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Kidney shape -->
      <path d="M32 8C20 8 14 16 14 24c0 6 3 10 3 16s-3 10-3 16c0 0 6-4 18-4s18 4 18 4c0-6-3-10-3-16s3-10 3-16C50 16 44 8 32 8z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    </svg>
    <svg class="bg-icon bg-icon-2" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Water drop -->
      <path d="M32 6C32 6 16 26 16 38c0 8.8 7.2 16 16 16s16-7.2 16-16C48 26 32 6 32 6z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    </svg>
    <svg class="bg-icon bg-icon-3" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Plus/medical cross -->
      <rect x="26" y="12" width="12" height="40" rx="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <rect x="12" y="26" width="40" height="12" rx="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
    </svg>
    <svg class="bg-icon bg-icon-4" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Dialysis machine simplified -->
      <rect x="18" y="10" width="28" height="44" rx="4" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <circle cx="32" cy="28" r="8" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <line x1="32" y1="20" x2="32" y2="36" stroke="currentColor" stroke-width="1"/>
      <line x1="24" y1="28" x2="40" y2="28" stroke="currentColor" stroke-width="1"/>
      <rect x="24" y="42" width="16" height="4" rx="1" stroke="currentColor" stroke-width="1" fill="none"/>
    </svg>
    <svg class="bg-icon bg-icon-5" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Water drop -->
      <path d="M32 6C32 6 16 26 16 38c0 8.8 7.2 16 16 16s16-7.2 16-16C48 26 32 6 32 6z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    </svg>
    <svg class="bg-icon bg-icon-6" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Kidney shape -->
      <path d="M32 8C20 8 14 16 14 24c0 6 3 10 3 16s-3 10-3 16c0 0 6-4 18-4s18 4 18 4c0-6-3-10-3-16s3-10 3-16C50 16 44 8 32 8z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    </svg>
  </div>

  <div class="login-box">
    <h1 class="login-title">部北洗腎室庫存管理平台</h1>
    <form (submit)="$event.preventDefault(); handleLogin()" class="login-form">
      <div class="form-group">
        <label for="username">帳號</label>
        <input
          type="text"
          id="username"
          [value]="username()"
          (input)="onUsernameInput($event)"
          required
          autocomplete="username"
          placeholder="請輸入帳號"
          [disabled]="isLoading()"
        />
      </div>
      <div class="form-group">
        <label for="password">密碼</label>
        <div class="password-wrapper">
          <input
            [type]="isPasswordVisible() ? 'text' : 'password'"
            id="password"
            [value]="password()"
            (input)="onPasswordInput($event)"
            required
            autocomplete="current-password"
            placeholder="請輸入密碼"
            [disabled]="isLoading()"
          />
          <span class="password-toggle-icon" (click)="togglePasswordVisibility()">
            {{ isPasswordVisible() ? '\uD83D\uDE48' : '\uD83D\uDC41\uFE0F' }}
          </span>
        </div>
      </div>
      @if (errorMessage()) {
        <p class="error-message">{{ errorMessage() }}</p>
      }
      <button type="submit" class="login-button" [disabled]="isLoading()">
        {{ isLoading() ? '登入系統中...' : '登入' }}
      </button>
    </form>

    <div class="user-notice">
      <p><strong>使用者須知：</strong></p>
      <ul>
        <li>帳號：預設為您的 <strong>HIS 帳號</strong>。</li>
        <li>密碼：請使用管理員設定的密碼登入。</li>
        <li>密碼規則：至少 8 個字元，包含大寫、小寫字母和數字。</li>
      </ul>
      <p class="forgot-password">若忘記密碼，請聯繫系統管理員或護理長重設。</p>
    </div>
  </div>

  <!-- Full-screen loading overlay -->
  @if (isLoading()) {
    <div class="loading-overlay">
      <div class="spinner"></div>
      <p class="loading-text">正在驗證身分，請稍候...</p>
    </div>
  }
</div>
