<div class="page-container" [ngClass]="{ 'is-locked': isPageLocked() }">
  <header class="page-header">
    <div class="header-toolbar">
      <div class="toolbar-left">
        <h1 class="page-title">床位總表</h1>
        <button class="btn btn-warning" (click)="handleScheduleCheck()">排程檢視</button>
        <button class="btn btn-info" (click)="openBaseAssignmentDialog()" [disabled]="isPageLocked()">
          智慧排床
        </button>

        <div class="search-container">
          <input
            type="text"
            [ngModel]="searchQueryValue()"
            (ngModelChange)="searchQueryValue.set($event)"
            class="patient-search-input"
            placeholder="搜尋病人姓名/病歷號..."
            (focus)="isSearchFocused.set(true)"
            (blur)="handleSearchBlur()"
          />
          @if (searchResults().length > 0 && isSearchFocused()) {
          <ul class="search-results">
            @for (patient of searchResults(); track patient.id) {
              <li (click)="locatePatientOnGrid(patient.id)">
                {{ patient.name }} - {{ patient.medicalRecordNumber }}
              </li>
            }
          </ul>
        }
        </div>
      </div>
      <div class="toolbar-right">
        <span class="status-text">{{ statusText() }}</span>
        <button class="btn btn-secondary" (click)="exportBaseScheduleToExcel()">匯出總表</button>
      </div>
    </div>
  </header>

  <main class="page-main-content">
    <div class="schedule-area">
      <div class="stats-toolbar-wrapper" [style.paddingLeft.px]="leftOffset()">
        <app-stats-toolbar
          [statsData]="statsToolbarData()"
          [weekdays]="statsToolbarWeekdays()"
          [columnWidths]="columnWidths()"
          size="normal"
          [showPatientNumbers]="true"
        ></app-stats-toolbar>
      </div>
      @if (masterRecord()) {
        <app-schedule-table
          class="schedule-table-component"
          [layout]="bedLayout"
          [scheduleData]="weekScheduleMap()"
          [patientMap]="patientStore.patientMap()"
          [shifts]="SHIFTS"
          [weekdays]="WEEKDAYS"
          [weekDates]="[]"
          [hepatitisBeds]="hepatitisBeds"
          [getStyleFunc]="getBaseCellStyle"
          [isPageLocked]="isPageLocked()"
          (gridClick)="handleGridClick($event)"
          (drop)="onDrop($event.event, $event.slotId)"
          (dragStart)="onDragStart($event.event, $event.slotId)"
          (dragOver)="onDragOver($event)"
          (dragleave)="onDragLeave($event)"
          (columnWidthsChange)="updateColumnWidths($event)"
          (leftOffsetChange)="updateLeftOffset($event)"
        ></app-schedule-table>
      } @else {
        <div class="loading-state">正在載入總床位表資料...</div>
      }
    </div>
  </main>

  <!-- Dialogs -->
  <app-selection-dialog
    [isVisible]="isActionDialogVisible()"
    [title]="'操作病人：' + actionTarget().patientName"
    [options]="ACTION_OPTIONS"
    (select)="handleActionSelect($event)"
    (cancel)="isActionDialogVisible.set(false)"
  ></app-selection-dialog>
  <app-bed-assignment-dialog
    [isVisible]="isAssignmentDialogVisible()"
    [allPatients]="patientStore.allPatients()"
    [bedLayout]="bedLayout"
    [scheduleData]="weekScheduleMap()"
    [shifts]="SHIFTS"
    [freqMap]="FREQ_MAP_TO_DAY_INDEX"
    [context]="assignmentContext()"
    (close)="isAssignmentDialogVisible.set(false)"
    (assignBed)="handleBedAssigned($event)"
  ></app-bed-assignment-dialog>
  <app-patient-select-dialog
    [isVisible]="isPatientSelectDialogVisible()"
    title="選擇病人排班 (總表)"
    [patients]="filteredPatientsForSelect()"
    [showFillOptions]="false"
    (confirmEvent)="handlePatientSelect($event)"
    (cancelEvent)="isPatientSelectDialogVisible.set(false)"
  ></app-patient-select-dialog>
  <app-alert-dialog
    [isVisible]="isAlertDialogVisible()"
    [title]="alertDialogTitle()"
    [message]="alertDialogMessage()"
    (confirm)="isAlertDialogVisible.set(false)"
  ></app-alert-dialog>
  <app-confirm-dialog
    [isVisible]="isConfirmDialogVisible()"
    [title]="confirmDialogTitle()"
    [message]="confirmDialogMessage()"
    (confirm)="handleConfirm()"
    (cancel)="handleCancel()"
  ></app-confirm-dialog>
</div>
