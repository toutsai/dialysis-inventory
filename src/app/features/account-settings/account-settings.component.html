<div class="page-wrapper">
  <div class="settings-card">
    <header class="card-header">
      <h1 class="page-title">帳號設定</h1>
      <p *ngIf="currentUser()" class="subtitle">
        為帳號 <span class="username">{{ currentUser()!.name }}</span> 更改密碼
      </p>
    </header>

    <form (ngSubmit)="handleChangePassword()" class="password-form">
      <div class="form-group">
        <label for="old-password">舊密碼</label>
        <div class="password-wrapper">
          <input
            id="old-password"
            [type]="isOldPasswordVisible() ? 'text' : 'password'"
            [ngModel]="oldPassword()"
            (ngModelChange)="oldPassword.set($event)"
            name="oldPassword"
            required
            autocomplete="current-password"
          />
          <span class="password-toggle-icon" (click)="togglePasswordVisibility('old')">
            {{ isOldPasswordVisible() ? '🙈' : '👁️' }}
          </span>
        </div>
      </div>

      <div class="form-group">
        <label for="new-password">新密碼</label>
        <div class="password-wrapper">
          <input
            id="new-password"
            [type]="isNewPasswordVisible() ? 'text' : 'password'"
            [ngModel]="newPassword()"
            (ngModelChange)="newPassword.set($event)"
            name="newPassword"
            required
            autocomplete="new-password"
          />
          <span class="password-toggle-icon" (click)="togglePasswordVisibility('new')">
            {{ isNewPasswordVisible() ? '🙈' : '👁️' }}
          </span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm-password">確認新密碼</label>
        <div class="password-wrapper">
          <input
            id="confirm-password"
            [type]="isConfirmPasswordVisible() ? 'text' : 'password'"
            [ngModel]="confirmPassword()"
            (ngModelChange)="confirmPassword.set($event)"
            name="confirmPassword"
            required
            autocomplete="new-password"
          />
          <span class="password-toggle-icon" (click)="togglePasswordVisibility('confirm')">
            {{ isConfirmPasswordVisible() ? '🙈' : '👁️' }}
          </span>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="handleCancel()">取消</button>
        <button type="submit" class="submit-btn" [disabled]="isLoading()">
          {{ isLoading() ? '處理中...' : '確認更改' }}
        </button>
      </div>

      <p *ngIf="message()" class="message" [ngClass]="messageType()">
        {{ message() }}
      </p>
    </form>
  </div>
</div>
