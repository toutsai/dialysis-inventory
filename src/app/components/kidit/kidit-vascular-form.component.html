<div class="access-form">
  <div class="form-section">
    <h4 class="section-title">
      {{ type === 'current' ? '目前使用血管通路' : '其他未使用血管通路' }}
    </h4>

    <div class="form-content" *ngIf="localData">
      <!-- 1. 自體動靜脈瘻管 -->
      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="localData.isAutoCap" />
          <span class="label-text">自體動靜脈瘻管 (AV-Fistula)</span>
        </label>
        <div *ngIf="localData.isAutoCap" class="sub-options">
          <select [(ngModel)]="localData.autoCapSide">
            <option value="">側別</option>
            <option value="L">左</option>
            <option value="R">右</option>
          </select>
          <select [(ngModel)]="localData.autoCapSite">
            <option value="">部位</option>
            <option value="1">前臂</option>
            <option value="2">上臂</option>
            <option value="3">大腿</option>
          </select>
        </div>
      </div>

      <!-- 2. 人工動靜脈瘻管 -->
      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="localData.isManuCap" />
          <span class="label-text">人工動靜脈瘻管 (AV-Graft)</span>
        </label>
        <div *ngIf="localData.isManuCap" class="sub-options">
          <select [(ngModel)]="localData.manuCapSide">
            <option value="">側別</option>
            <option value="L">左</option>
            <option value="R">右</option>
          </select>
          <select [(ngModel)]="localData.manuCapSite">
            <option value="">部位</option>
            <option value="1">前臂直型</option>
            <option value="2">前臂彎型</option>
            <option value="3">上臂</option>
            <option value="4">大腿</option>
          </select>
        </div>
      </div>

      <!-- 3. 長期導管 -->
      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="localData.isPermCath" />
          <span class="label-text">長期導管 (Perm Cath)</span>
        </label>
        <div *ngIf="localData.isPermCath" class="sub-options">
          <select [(ngModel)]="localData.permCathSide">
            <option value="">側別</option>
            <option value="L">左</option>
            <option value="R">右</option>
          </select>
          <select [(ngModel)]="localData.permCathSite">
            <option value="">部位</option>
            <option value="1">頸靜脈</option>
            <option value="2">鎖骨下靜脈</option>
            <option value="3">股靜脈</option>
          </select>
        </div>
      </div>

      <!-- 4. 雙腔導管 -->
      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="localData.isDoubleLumen" />
          <span class="label-text">雙腔導管 (Double Lumen)</span>
        </label>
        <div *ngIf="localData.isDoubleLumen" class="sub-options">
          <select [(ngModel)]="localData.dlSide">
            <option value="">側別</option>
            <option value="L">左</option>
            <option value="R">右</option>
          </select>
          <select [(ngModel)]="localData.dlSite">
            <option value="">部位</option>
            <option value="1">頸靜脈</option>
            <option value="2">鎖骨下靜脈</option>
            <option value="3">股靜脈</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="save-btn" (click)="saveData()" [disabled]="isSaving">
          <i class="fas fa-save"></i> {{ isSaving ? '儲存中...' : '儲存設定' }}
        </button>
      </div>
    </div>
  </div>
</div>
