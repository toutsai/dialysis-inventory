@if (formData) {
  <div class="kidit-form-container">
    <!-- 區塊 1: 身分與基本資料 -->
    <div class="form-section">
      <h4 class="section-title">基本身分資料</h4>
      <div class="form-grid">
        <div class="form-group">
          <label>01 姓名</label>
          <input type="text" [(ngModel)]="formData.name" disabled class="input-disabled" />
        </div>

        <div class="form-group">
          <label>04 身分證號</label>
          <input type="text" [(ngModel)]="formData.idNumber" placeholder="10碼" />
        </div>

        <div class="form-group">
          <label>08 病歷號</label>
          <input type="text" [(ngModel)]="formData.medicalRecordNumber" placeholder="10碼" />
        </div>

        <div class="form-group">
          <label>02 病患類別</label>
          <select [(ngModel)]="formData.patientCategory">
            @for (opt of opts.patientCategory; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label>03 生日 (西元)</label>
          <input type="date" [(ngModel)]="formData.birthDate" />
        </div>

        <div class="form-group">
          <label>05 性別</label>
          <select [(ngModel)]="formData.gender">
            @for (opt of opts.gender; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label>15 血型</label>
          <select [(ngModel)]="formData.bloodType">
            @for (opt of opts.bloodType; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label>17 原住民</label>
          <select [(ngModel)]="formData.isIndigenous">
            @for (opt of opts.yesNo; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label>18 福保身分</label>
          <select [(ngModel)]="formData.isWelfare">
            @for (opt of opts.yesNo; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label>16 重大傷病卡號</label>
          <input type="text" [(ngModel)]="formData.catastrophicCardNo" placeholder="10碼" />
        </div>
      </div>
    </div>

    <!-- 區塊 2: 聯絡與社會資料 -->
    <div class="form-section">
      <h4 class="section-title">聯絡與社會資料</h4>
      <div class="form-grid">
        <div class="form-group full-width">
          <label>10 地址</label>
          <input type="text" [(ngModel)]="formData.address" placeholder="最多80字" />
        </div>

        <div class="form-group">
          <label>07 電話</label>
          <input type="text" [(ngModel)]="formData.phone" placeholder="最多25碼" />
        </div>

        <div class="form-group">
          <label>06 婚姻</label>
          <select [(ngModel)]="formData.maritalStatus">
            @for (opt of opts.maritalStatus; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label>11 教育程度</label>
          <select [(ngModel)]="formData.education">
            @for (opt of opts.education; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label>12 職業</label>
          <select [(ngModel)]="formData.occupation">
            @for (opt of opts.occupation; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label>13 連絡人</label>
          <input type="text" [(ngModel)]="formData.contactPerson" placeholder="姓名" />
        </div>

        <div class="form-group">
          <label>14 關係</label>
          <select [(ngModel)]="formData.relationship">
            @for (opt of opts.relation; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <!-- 區塊 3: 透析與病史資料 -->
    <div class="form-section">
      <h4 class="section-title">透析與病史資料</h4>
      <div class="form-grid">
        <div class="form-group">
          <label>09 透析代號</label>
          <input type="text" [(ngModel)]="formData.dialysisCode" placeholder="10碼" />
        </div>

        <div class="form-group span-2">
          <label>19 狀態</label>
          <select [(ngModel)]="formData.status">
            @for (opt of opts.status; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label>20 首次治療日期</label>
          <input type="date" [(ngModel)]="formData.firstDialysisDate" />
        </div>

        <div class="form-group">
          <label>21 本院開始治療日期</label>
          <input type="date" [(ngModel)]="formData.hospitalStartDate" />
        </div>

        <div class="form-group">
          <label>22 原發病大類</label>
          <select [(ngModel)]="formData.diagnosisCategory">
            @for (opt of opts.diagnosisCategory; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="form-group span-2">
          <label>23 原發病細類</label>
          <select [(ngModel)]="formData.diagnosisSubcategory">
            <option value="">請選擇</option>
            @for (opt of opts.diagnosisSubcategory; track opt.value) {
              <option [value]="opt.value">{{ opt.value }} - {{ opt.label }}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="save-btn" (click)="saveData()" [disabled]="isSaving">
        <i class="fas fa-save"></i> {{ isSaving ? '儲存中...' : '儲存 KiDit 資料' }}
      </button>
    </div>
  </div>
}
