<div class="modal-overlay" (click)="close()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <!-- Header -->
    <header class="modal-header">
      <div class="header-title">
        <i class="fas fa-clipboard-list icon"></i>
        <h3>{{ date }} 工作日誌詳情</h3>
      </div>
      <button class="close-btn" (click)="close()">
        <i class="fas fa-times"></i>
      </button>
    </header>

    <!-- Tabs -->
    <div class="tabs-header">
      <button
        *ngFor="let tab of tabs"
        [class.active]="activeTab === tab.key"
        class="tab-btn"
        (click)="handleTabClick(tab.key)"
      >
        {{ tab.label }}
        <span class="patient-tag" *ngIf="tab.key !== 'movement' && selectedPatient">
          {{ selectedPatient.name }}
        </span>
      </button>
    </div>

    <div class="modal-body">
      <!-- Tab 1: Movement List -->
      <div *ngIf="activeTab === 'movement'" class="tab-pane">
        <div class="action-bar">
          <p class="hint-text">
            <i class="fas fa-info-circle"></i>
            點擊列表中的病人以編輯詳細資料。若該項目無需申報，可點擊垃圾桶刪除。
          </p>
        </div>

        <div class="table-responsive">
          <table class="modern-table">
            <thead>
              <tr>
                <th style="width:10%">類型</th>
                <th style="width:12%">姓名</th>
                <th style="width:12%">病歷號</th>
                <th style="width:26%">詳細內容</th>
                <th style="width:20%">轉出院所</th>
                <th style="width:10%" class="text-center">KiDit 登錄</th>
                <th style="width:10%" class="text-center">操作</th>
              </tr>
            </thead>
            <tbody>
              <tr
                *ngFor="let event of localEvents; let i = index"
                [class.is-selected]="selectedPatientId === event.patientId"
                (click)="selectPatient(event)"
              >
                <td>
                  <span class="status-badge" [ngClass]="getBadgeClass(event.type)">
                    {{ translateType(event.type) }}
                  </span>
                </td>
                <td class="font-medium">{{ event.patientName }}</td>
                <td class="text-muted">{{ event.medicalRecordNumber || '-' }}</td>
                <td class="text-muted">{{ event.details }}</td>
                <td (click)="$event.stopPropagation()">
                  <input
                    type="text"
                    [(ngModel)]="event.transferOutHospital"
                    placeholder="輸入院所..."
                    class="form-input"
                  />
                </td>
                <td class="text-center" (click)="$event.stopPropagation()">
                  <label class="checkbox-container">
                    <input type="checkbox" [(ngModel)]="event.isRegistered" />
                    <span class="checkmark"></span>
                  </label>
                </td>
                <td class="text-center action-cell" (click)="$event.stopPropagation()">
                  <button class="icon-btn delete-btn" (click)="deleteEvent(i)" title="從列表中移除">
                    <i class="fas fa-trash-alt"></i>
                  </button>
                  <div class="status-indicator">
                    <i *ngIf="isKiDitDataComplete(event)" class="fas fa-check-circle text-green" title="KiDit 資料已完整"></i>
                    <button *ngIf="!isKiDitDataComplete(event)" class="icon-btn warning-btn" (click)="handleIncompleteClick(event)" title="KiDit 資料尚未填寫完整">
                      <i class="fas fa-exclamation-triangle"></i>
                    </button>
                  </div>
                </td>
              </tr>
              <tr *ngIf="localEvents.length === 0">
                <td colspan="7" class="empty-row">本日無相關動態紀錄</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="footer-actions">
          <button class="btn-primary" (click)="saveAllEvents()">
            <i class="fas fa-save"></i> 儲存動態列表變更
          </button>
        </div>
      </div>

      <!-- Tab 2+3+4: Detail forms -->
      <div *ngIf="activeTab !== 'movement'" class="tab-pane details-pane">
        <div *ngIf="!selectedPatient" class="empty-state">
          <i class="fas fa-hand-point-left bounce-icon"></i>
          <p>請先回到「當日病患動態」頁籤，點選一位病人。</p>
        </div>

        <div *ngIf="selectedPatient">
          <!-- Vascular tab with sub-tabs -->
          <div *ngIf="activeTab === 'vascular'" class="vascular-container">
            <div class="sub-tabs">
              <button [class.active]="subTab === 'current'" (click)="subTab = 'current'">目前使用</button>
              <button [class.active]="subTab === 'unused'" (click)="subTab = 'unused'">其他未使用</button>
            </div>
            <app-kidit-vascular-form
              [type]="subTab"
              [date]="date"
              [eventId]="selectedEvent.id"
              [initialData]="getEventData('kidit_vascular')"
              [masterPatient]="selectedPatientData"
              (updated)="handleDataUpdated('kidit_vascular', $event)"
            ></app-kidit-vascular-form>
          </div>

          <app-kidit-patient-form
            *ngIf="activeTab === 'profile'"
            [date]="date"
            [eventId]="selectedEvent.id"
            [initialData]="getEventData('kidit_profile')"
            [masterPatient]="selectedPatientData"
            (updated)="handleDataUpdated('kidit_profile', $event)"
          ></app-kidit-patient-form>

          <app-kidit-history-form
            *ngIf="activeTab === 'history'"
            [date]="date"
            [eventId]="selectedEvent.id"
            [initialData]="getEventData('kidit_history')"
            [masterPatient]="selectedPatientData"
            (updated)="handleDataUpdated('kidit_history', $event)"
          ></app-kidit-history-form>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Delete -->
  <div *ngIf="showConfirmDelete" class="confirm-overlay" (click)="cancelDelete()">
    <div class="confirm-box" (click)="$event.stopPropagation()">
      <h4>確認移除</h4>
      <p>{{ confirmMessage }}</p>
      <div class="confirm-actions">
        <button class="btn-cancel" (click)="cancelDelete()">取消</button>
        <button class="btn-danger" (click)="executeDelete()">刪除</button>
      </div>
    </div>
  </div>
</div>
