@if (computedMessageTypes.length > 0) {
  <div class="messages-icon-container">
    @for (type of computedMessageTypes; track type) {
      <span
        class="message-icon-wrapper"
        [title]="getTooltipText(type)"
        (click)="handleClick(type); $event.stopPropagation()"
      >
        {{ getMessageTypeIcon(type) }}
      </span>
    }
  </div>
}
