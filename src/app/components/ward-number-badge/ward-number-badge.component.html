<div class="ward-badge" (click)="startEdit(); $event.stopPropagation()" [title]="title">
  @if (!editing) {
    <span>{{ value || '+' }}</span>
  } @else {
    <input
      #inp
      [(ngModel)]="local"
      (keyup.enter)="save()"
      (blur)="save()"
      [placeholder]="placeholder"
      class="ward-input"
      [maxlength]="16"
    />
  }
</div>
