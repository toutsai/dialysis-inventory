<div class="holiday-container">
    <h4>2025年國定假日管理</h4>

    <div class="holiday-item">
      <!-- 假日名稱下拉選單 -->
      <select [(ngModel)]="selectedHolidayName">
        <option disabled value="">請選擇假日</option>
        @for (holiday of holidays2025; track holiday.name) {
  <option [value]="holiday.name">
          {{ holiday.name }}
        </option>
        }
        <option value="custom">-- 自訂假日 --</option>
      </select>

      <!-- 如果選擇自訂，才顯示這個輸入框 -->
      @if (selectedHolidayName === 'custom') {
  <input
       
        type="text"
        [(ngModel)]="customHolidayName"
        placeholder="請輸入假日名稱"
      />
    }
    </div>

    <div class="holiday-item">
      <!-- 日期選擇器 -->
      <input type="date" [(ngModel)]="selectedDate" />
    </div>

    <button (click)="addHoliday">新增假日</button>

    <!-- 這裡可以顯示已新增的假日列表 -->
    <!-- ... -->
  </div>
