@if (isVisible) {
  <div class="selection-dialog-overlay" (click)="onOverlayClick($event)">
    <div class="selection-dialog-content">
      <h3>{{ title }}</h3>
      <div class="button-group">
        @for (option of options; track option.value) {
          <button (click)="handleSelect(option.value)">
            {{ option.text }}
          </button>
        }
      </div>
      <div class="button-group">
        <button (click)="handleCancel()" class="cancel-btn">取消</button>
      </div>
    </div>
  </div>
}
