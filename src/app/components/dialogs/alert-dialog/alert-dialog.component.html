@if (isVisible) {
  <div class="dialog-backdrop">
    <dialog [open]="true" class="alert-dialog">
      @if (title) {
        <header class="dialog-header">
          <h3>{{ title }}</h3>
        </header>
      }
      <main class="dialog-content">
        <pre>{{ message }}</pre>
      </main>
      <footer class="dialog-footer">
        @if (showCancel) {
          <button class="btn-secondary" (click)="handleCancel()">否</button>
        }
        <button class="btn-primary" (click)="handleConfirm()">{{ showCancel ? '是' : '確定' }}</button>
      </footer>
    </dialog>
  </div>
}
