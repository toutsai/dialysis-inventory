@if (isVisible) {
  <div class="modal-overlay">
    <div class="modal-content">
      <header class="modal-header">
        <h2>{{ isEditing ? '編輯使用者' : '新增使用者' }}</h2>
        <button class="close-btn" (click)="closeModal()">×</button>
      </header>
      <main class="modal-body">
        <form (ngSubmit)="handleSubmit()" class="user-form">
          <!-- ... 其他表單欄位 (姓名、職稱、帳號密碼等) 維持不變 ... -->
          <div class="form-row">
            <div class="form-group">
              <label for="name">姓名</label>
              <input id="name" name="name" type="text" [(ngModel)]="form.name" required />
            </div>
            <div class="form-group">
              <label for="title">職稱</label>
              <select id="title" name="title" [(ngModel)]="form.title" (ngModelChange)="onTitleChange()">
                @for (titleOption of titles; track titleOption) {
                  <option [value]="titleOption">
                    {{ titleOption }}
                  </option>
                }
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="username">帳號 (Username)</label>
              <input
                id="username"
                name="username"
                type="text"
                [(ngModel)]="form.username"
                required
                [disabled]="isEditing"
              />
            </div>
            <div class="form-group">
              <label for="password">密碼</label>
              <input
                id="password"
                name="password"
                type="password"
                [(ngModel)]="form.password"
                [placeholder]="isEditing ? '留白表示不更改密碼' : '至少8字元，含大小寫及數字'"
                [required]="!isEditing"
              />
              @if (!isEditing) {
                <small class="password-hint">需包含大寫、小寫字母和數字</small>
              }
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="role">角色 (Role)</label>
              <select id="role" name="role" [(ngModel)]="form.role">
                @for (roleOption of roles; track roleOption) {
                  <option [value]="roleOption.value">
                    {{ roleOption.text }}
                  </option>
                }
              </select>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" [(ngModel)]="form.email" />
            </div>
          </div>

          @if (form.title === '主治醫師') {
            <div class="physician-fields">
              <hr class="field-separator" />
              <div class="form-row">
                <div class="form-group">
                  <label for="staffId">員工編號</label>
                  <input id="staffId" name="staffId" type="text" [(ngModel)]="form.staffId" />
                </div>
                <div class="form-group">
                  <label for="phone">電話</label>
                  <input id="phone" name="phone" type="tel" [(ngModel)]="form.phone" />
                </div>
              </div>

              <!-- 預設查房班表設定 UI (維持不變) -->
              <div class="form-group">
                <label>預設查房班表 (洗腎室/ICU)</label>
                <div class="schedule-checkbox-group">
                  @for (option of scheduleOptions; track option.value) {
                    <div class="checkbox-wrapper">
                      <input
                        type="checkbox"
                        [id]="'sched-' + option.value"
                        [checked]="isScheduleChecked(form.defaultSchedules, option.value)"
                        (change)="toggleSchedule(form.defaultSchedules, option.value)"
                      />
                      <label [for]="'sched-' + option.value">{{ option.label }}</label>
                    </div>
                  }
                </div>
              </div>

              <!-- 步驟 6: 新增「預設會診班表」的 UI -->
              <div class="form-group">
                <label>預設會診班表</label>
                <div class="schedule-checkbox-group">
                  @for (option of consultationScheduleOptions; track option.value) {
                    <div class="checkbox-wrapper">
                      <input
                        type="checkbox"
                        [id]="'consult-sched-' + option.value"
                        [checked]="isScheduleChecked(form.defaultConsultationSchedules, option.value)"
                        (change)="toggleSchedule(form.defaultConsultationSchedules, option.value)"
                      />
                      <label [for]="'consult-sched-' + option.value">{{ option.label }}</label>
                    </div>
                  }
                </div>
              </div>
            </div>
          }
        </form>
      </main>
      <footer class="modal-footer">
        <button class="btn btn-save" (click)="handleSubmit()">儲存</button>
        <button class="btn btn-cancel" (click)="closeModal()">取消</button>
      </footer>
    </div>
  </div>
}
