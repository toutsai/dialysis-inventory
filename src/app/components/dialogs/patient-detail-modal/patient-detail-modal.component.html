@if (isVisible) {
  <div class="modal-overlay">
    <div class="modal-container large">
      <div class="modal-body-wrapper">

        <div class="modal-header">
          <div class="header-title-area">
            <h2>{{ patient?.name }} - 詳細資料</h2>
          </div>

          @if (slotList.length > 1) {
            <div class="patient-navigator">
              <button
                (click)="switchToPatient(currentIndex - 1)"
                [disabled]="currentIndex === 0"
                class="nav-btn"
                title="前一床病人"
              >
                <i class="fas fa-chevron-left"></i> 前一床
              </button>
              <span class="nav-counter">{{ currentSlotInfo.shift }} / {{ currentSlotInfo.bedNum }}</span>
              <button
                (click)="switchToPatient(currentIndex + 1)"
                [disabled]="currentIndex >= slotList.length - 1"
                class="nav-btn"
                title="後一床病人"
              >
                後一床 <i class="fas fa-chevron-right"></i>
              </button>
            </div>
          }

          <button (click)="handleClose()" class="close-btn">&times;</button>
        </div>

        <!-- Tabs navigation -->
        <div class="tabs-navigation">
          <button [class.active]="activeTab === 'records'" (click)="activeTab = 'records'">
            紀錄
          </button>
          <button [class.active]="activeTab === 'memos'" (click)="activeTab = 'memos'">
            @if (hasPendingMemosForPatient) {
              <span class="memo-indicator"></span>
            }
            備忘
          </button>
          <button [class.active]="activeTab === 'labs'" (click)="activeTab = 'labs'">
            檢驗
          </button>
          <button [class.active]="activeTab === 'correlation'" (click)="activeTab = 'correlation'">
            開藥
          </button>
          <button [class.active]="activeTab === 'imaging'" (click)="activeTab = 'imaging'">
            影像
          </button>
        </div>

        <!-- Tab content -->
        <div class="modal-body">
          <!-- Records tab -->
          <div [style.display]="activeTab === 'records' ? '' : 'none'" class="tab-panel">
            @if (patient) {
              <app-condition-record-panel
                [patientId]="patient.id"
                [patientName]="patient.name"
                [targetDate]="currentDate"
                [isReadOnly]="isLockedForThisUser"
                (recordsChanged)="recordUpdated.emit()"
              ></app-condition-record-panel>
            }
          </div>

          <!-- Memos tab -->
          <div [style.display]="activeTab === 'memos' ? '' : 'none'" class="tab-panel">
            @if (patient) {
              <app-memo-panel [patientId]="patient.id"></app-memo-panel>
            }
          </div>

          <!-- Labs tab -->
          <div [style.display]="activeTab === 'labs' ? '' : 'none'" class="tab-panel">
            @if (patient) {
              <app-patient-lab-summary-panel
                [patient]="patient"
                (saveRecord)="handleSaveLabSummaryAsRecord($event)"
              ></app-patient-lab-summary-panel>
            }
          </div>

          <!-- Correlation tab -->
          <div [style.display]="activeTab === 'correlation' ? '' : 'none'" class="tab-panel">
            @if (patient && activeTab === 'correlation') {
              <app-lab-med-correlation-view
                [patient]="patient"
              ></app-lab-med-correlation-view>
            }
          </div>

          <!-- Imaging tab -->
          <div [style.display]="activeTab === 'imaging' ? '' : 'none'" class="tab-panel imaging-panel">
            <div class="image-uploader">
              <div class="idle-buttons">
                <a
                  href="https://ulite.tph.mohw.gov.tw:8080"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="btn-pacs"
                >
                  <i class="fas fa-x-ray"></i> 手機版PACS連結
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
}
