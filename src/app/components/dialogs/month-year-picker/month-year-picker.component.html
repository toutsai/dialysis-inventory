@if (isVisible) {
  <div class="picker-backdrop">
    <div class="picker-dialog">
      <header class="picker-header">
        <button class="nav-btn" (click)="changeYear(-1)">&lt;</button>
        <span class="year-display">{{ displayYear }}</span>
        <button class="nav-btn" (click)="changeYear(1)">&gt;</button>
      </header>
      <main class="picker-grid">
        @for (month of months; track month; let index = $index) {
  <button
         
         
          class="month-btn"
          [ngClass]="{ 'is-current': isCurrentMonth(index) }"
          (click)="selectMonth(index)"
        >
          {{ month }}
        </button>
        }
      </main>
    </div>
  </div>
}
