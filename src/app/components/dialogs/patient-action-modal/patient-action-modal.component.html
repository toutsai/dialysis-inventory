@if (isVisible) {
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <header class="modal-header">
        <h3>操作選單：{{ patient?.name }}</h3>
        <button class="close-btn" (click)="closeModal()">×</button>
      </header>
      <main class="modal-body">
        <ul class="action-list">
          <li class="action-item">
            <button class="action-btn" (click)="emitAction('view-condition-record')">
              <span class="icon">🩺</span>
              <span class="text">病情紀錄</span>
            </button>
          </li>
          @if (hasMemo) {
            <li class="action-item">
              <button class="action-btn" (click)="emitAction('view-memos')">
                <span class="icon">💬</span>
                <span class="text">查看備忘</span>
                <span class="badge">!</span>
              </button>
            </li>
          }
          <li class="action-item">
            <button class="action-btn" (click)="emitAction('view-lab-reports')">
              <span class="icon">📄</span>
              <span class="text">檢驗報告</span>
            </button>
          </li>
        </ul>
      </main>
    </div>
  </div>
}
